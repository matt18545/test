<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarthSight IA - Version Fonctionnelle</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; overflow: hidden; background-color: #1e1e1e; color: #fff; }
        #sidebar { width: 400px; padding: 25px; background: #2d2d2d; display: flex; flex-direction: column; gap: 15px; z-index: 1000; box-shadow: 4px 0 15px rgba(0,0,0,0.5); overflow-y: auto;}
        #map { flex-grow: 1; height: 100%; cursor: crosshair; }
        h2 { margin: 0; font-size: 1.5rem; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: bold; font-size: 0.85rem; color: #ccc; }
        input[type="text"], input[type="password"] { padding: 10px; border: 1px solid #444; border-radius: 6px; background: #1e1e1e; color: white; font-size: 0.95rem; }
        input:focus { outline: none; border-color: #007bff; }
        button { padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #555; cursor: not-allowed; }
        #results-container { margin-top: 10px; flex-grow: 1; }
        .result-item { padding: 12px; background: #3a3a3a; border-radius: 6px; margin-bottom: 10px; border-left: 4px solid #28a745; font-size: 0.9rem;}
        .score { font-weight: bold; color: #28a745; }
        .success { background: #1e4620; padding: 10px; border-radius: 6px; font-size: 0.85rem; border-left: 3px solid #28a745;}
        .warning { background: #5a4000; padding: 10px; border-radius: 6px; font-size: 0.85rem; border-left: 3px solid #ffc107;}
        .error { background: #5a1010; padding: 10px; border-radius: 6px; font-size: 0.85rem; border-left: 3px solid #ff4444;}
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #007bff; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>EarthSight IA (Pro)</h2>
        
        <div class="success">
            <b>Système Actif :</b> L'outil capture désormais la vraie zone affichée et convertit les pixels analysés par l'IA en coordonnées GPS.
        </div>

        <div class="input-group">
            <label for="hf-token">Clé API Hugging Face (hf_...)</label>
            <input type="password" id="hf-token" placeholder="Collez votre token ici">
        </div>

        <div class="input-group">
            <label for="search-prompt">Objet à détecter (en anglais)</label>
            <input type="text" id="search-prompt" placeholder="ex: car, swimming pool, crosswalk...">
        </div>
        
        <button id="analyze-btn">Lancer l'analyse spatiale</button>
        
        <div id="results-container"></div>
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <script>
        // 1. Initialisation de la carte (Zoom élevé nécessaire pour détecter des objets)
        const map = L.map('map').setView([48.8584, 2.2945], 18); // Tour Eiffel par défaut

        // AJOUT CRUCIAL : crossOrigin: true permet à html2canvas de lire les images satellites sans erreur de sécurité
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            crossOrigin: true, 
            maxZoom: 19,
            attribution: 'Tiles &copy; Esri'
        }).addTo(map);

        // 2. Gestionnaire des calques dessinés (pour les résultats de l'IA)
        const aiLayers = new L.FeatureGroup();
        map.addLayer(aiLayers);

        const drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);
        const drawControl = new L.Control.Draw({
            edit: { featureGroup: drawnItems },
            draw: { polygon: false, polyline: false, circle: false, marker: false, circlemarker: false, rectangle: true }
        });
        map.addControl(drawControl);

        let searchAreaBounds = null;

        map.on(L.Draw.Event.CREATED, function (e) {
            drawnItems.clearLayers();
            drawnItems.addLayer(e.layer);
            searchAreaBounds = e.layer.getBounds();
        });

        // 3. Logique d'analyse
        document.getElementById('analyze-btn').addEventListener('click', async () => {
            const token = document.getElementById('hf-token').value.trim();
            const promptValue = document.getElementById('search-prompt').value.trim().toLowerCase();
            const resultsDiv = document.getElementById('results-container');

            if (!token || !promptValue || !searchAreaBounds) {
                resultsDiv.innerHTML = `<div class="warning">Veuillez renseigner le token, le mot-clé ET tracer une zone (rectangle bleu) sur la carte.</div>`;
                return;
            }

            document.getElementById('analyze-btn').disabled = true;
            aiLayers.clearLayers(); // Nettoie les anciens résultats
            resultsDiv.innerHTML = '<div style="text-align:center;"><div class="loader"></div><p>Extraction de la carte et analyse IA en cours...</p></div>';

            try {
                // ÉTAPE A : Prendre en photo la carte actuellement à l'écran
                const mapElement = document.getElementById('map');
                const canvas = await html2canvas(mapElement, { 
                    useCORS: true, 
                    allowTaint: false 
                });
                
                // Convertir la photo en base64 pour l'API
                const base64Image = canvas.toDataURL('image/jpeg').split(',')[1];

                // ÉTAPE B : Envoyer à l'IA Hugging Face (OwlViT)
                const apiUrl = "https://api-inference.huggingface.co/models/google/owlvit-base-patch32";
                
                const response = await fetch(apiUrl, {
                    method: "POST",
                    headers: { 
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        inputs: base64Image,
                        parameters: { candidate_labels: [promptValue] }
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    if(err.error && err.error.includes("is currently loading")) {
                         throw new Error("L'IA est en train de s'allumer (temps de chauffe). Veuillez patienter 20 secondes et cliquer à nouveau.");
                    }
                    throw new Error(err.error || `Erreur API: ${response.status}`);
                }

                const aiResults = await response.json();

                // ÉTAPE C : Filtrage et Géoréférencement
                let validDetectionsCount = 0;
                resultsDiv.innerHTML = `<h3 style="margin-top:0;">Résultats d'analyse</h3>`;

                aiResults.forEach(item => {
                    // L'API renvoie des scores et des labels
                    // On filtre pour s'assurer que c'est bien l'objet demandé
                    if (item.label.toLowerCase() === promptValue && item.score > 0.1) { // Score modéré pour la détection
                        
                        // L'IA nous donne les pixels de la boîte (xmin, ymin, xmax, ymax)
                        // MAGIE : On convertit ces pixels de l'écran en vraies coordonnées GPS (Lat/Lng)
                        const topLeftLatLng = map.containerPointToLatLng([item.box.xmin, item.box.ymin]);
                        const bottomRightLatLng = map.containerPointToLatLng([item.box.xmax, item.box.ymax]);
                        
                        const objectBounds = L.latLngBounds(topLeftLatLng, bottomRightLatLng);

                        // On vérifie si l'objet trouvé est bien A L'INTÉRIEUR de la zone dessinée par l'utilisateur
                        if (searchAreaBounds.intersects(objectBounds)) {
                            validDetectionsCount++;
                            const confidenceScore = (item.score * 100).toFixed(1);

                            // On dessine le vrai contour exact trouvé par l'IA !
                            const rect = L.rectangle(objectBounds, {
                                color: "#28a745", 
                                weight: 3, 
                                fillOpacity: 0.2
                            }).addTo(aiLayers);
                            
                            rect.bindPopup(`<b>${item.label.toUpperCase()}</b><br>Score IA: ${confidenceScore}%`).openPopup();

                            // Ajout dans la barre latérale
                            resultsDiv.innerHTML += `
                                <div class="result-item">
                                    <div><strong>${item.label.toUpperCase()}</strong></div>
                                    <div style="font-size: 0.8rem; color: #aaa; margin: 5px 0;">
                                        Lat: ${objectBounds.getCenter().lat.toFixed(5)}<br>
                                        Lng: ${objectBounds.getCenter().lng.toFixed(5)}
                                    </div>
                                    <div style="display: flex; justify-content: space-between;">
                                        <span>Précision:</span>
                                        <span class="score">${confidenceScore}%</span>
                                    </div>
                                </div>
                            `;
                        }
                    }
                });

                if (validDetectionsCount === 0) {
                    resultsDiv.innerHTML += `<div class="warning">Aucun objet "${promptValue}" détecté dans la zone sélectionnée. Essayez de zoomer davantage sur la carte !</div>`;
                } else {
                    resultsDiv.insertAdjacentHTML('afterbegin', `<div class="success">${validDetectionsCount} objet(s) trouvé(s) !</div>`);
                }

            } catch (error) {
                console.error(error);
                resultsDiv.innerHTML = `<div class="error"><b>Erreur système :</b><br>${error.message}</div>`;
            } finally {
                document.getElementById('analyze-btn').disabled = false;
            }
        });
    </script>
</body>
</html>
