<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarthSight IA - Télédétection Avancée</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    
    <style>
        /* === RESET & VARIABLES === */
        :root {
            --bg-dark: #121212;
            --bg-panel: #1e1e1e;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #374151;
        }

        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
        }
        
        /* === SIDEBAR === */
        #sidebar { 
            width: 400px; 
            padding: 24px; 
            background: var(--bg-panel); 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            z-index: 1000; 
            box-shadow: 4px 0 25px rgba(0,0,0,0.5); 
            overflow-y: auto;
            border-right: 1px solid var(--border);
        }
        
        h1 { margin: 0; font-size: 1.5rem; color: #fff; display: flex; align-items: center; gap: 10px;}
        h1::before { content: '🌍'; font-size: 1.8rem; }
        
        /* === FORMULAIRES === */
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;}
        
        input { 
            padding: 12px; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            background: var(--bg-dark); 
            color: white; 
            font-size: 0.95rem; 
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary); }
        
        button { 
            padding: 14px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 1rem; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s; 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        button:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); }
        button:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }
        
        /* === MESSAGES & RÉSULTATS === */
        .alert { padding: 12px; border-radius: 8px; font-size: 0.9rem; border-left: 4px solid; line-height: 1.4;}
        .alert-info { background: rgba(59, 130, 246, 0.1); border-color: var(--primary); }
        .alert-error { background: rgba(239, 68, 68, 0.1); border-color: var(--danger); }
        
        #results-container { flex-grow: 1; display: flex; flex-direction: column; gap: 10px; }
        
        .result-card { 
            background: var(--bg-dark); 
            border: 1px solid var(--border);
            padding: 15px; 
            border-radius: 8px; 
            border-left: 4px solid var(--success);
            animation: slideIn 0.3s ease-out;
        }
        .result-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .result-label { font-weight: bold; text-transform: capitalize; font-size: 1.1rem;}
        .result-score { background: rgba(16, 185, 129, 0.2); color: var(--success); padding: 4px 8px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .result-coords { font-size: 0.8rem; color: var(--text-muted); font-family: monospace; }
        
        /* === CARTE & UTILITAIRES === */
        #map { flex-grow: 1; height: 100%; cursor: crosshair; }
        
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid white; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <aside id="sidebar">
        <h1>EarthSight IA</h1>
        
        <div class="alert alert-info">
            Tracer un rectangle sur la carte, entrez un objet en anglais (ex: <b>car</b>, <b>tree</b>) et lancez l'analyse.
        </div>

        <div class="form-group">
            <label for="hf-token">Clé API (Hugging Face)</label>
            <input type="password" id="hf-token" placeholder="hf_xxxxxxxxxxxxxxxxxxxx">
        </div>

        <div class="form-group">
            <label for="search-prompt">Objet ciblé</label>
            <input type="text" id="search-prompt" placeholder="ex: swimming pool, crosswalk...">
        </div>
        
        <button id="analyze-btn">Lancer le scan satellite</button>
        
        <div id="results-container"></div>
    </aside>
    
    <main id="map"></main>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <script>
        /**
         * INITIALISATION DE LA CARTE (LEAFLET)
         */
        const map = L.map('map').setView([48.8584, 2.2945], 18);

        // Fond de carte satellite haute résolution (CORS Anonymous vital pour GitHub Pages)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            crossOrigin: 'anonymous', 
            maxZoom: 19,
            attribution: 'Tiles &copy; Esri'
        }).addTo(map);

        // Couches de dessins
        const drawnItems = new L.FeatureGroup().addTo(map); // Rectangle utilisateur
        const aiLayers = new L.FeatureGroup().addTo(map);   // Résultats de l'IA
        
        const drawControl = new L.Control.Draw({
            edit: { featureGroup: drawnItems },
            draw: { polygon: false, polyline: false, circle: false, marker: false, circlemarker: false, rectangle: true }
        });
        map.addControl(drawControl);

        let searchAreaBounds = null; // Stocke la zone de recherche

        // Événement : Nouveau rectangle tracé
        map.on(L.Draw.Event.CREATED, (e) => {
            drawnItems.clearLayers();
            drawnItems.addLayer(e.layer);
            searchAreaBounds = e.layer.getBounds();
        });


        /**
         * LOGIQUE D'ANALYSE IA
         */
        document.getElementById('analyze-btn').addEventListener('click', async () => {
            const btn = document.getElementById('analyze-btn');
            const token = document.getElementById('hf-token').value.trim();
            const promptValue = document.getElementById('search-prompt').value.trim().toLowerCase();
            const resultsDiv = document.getElementById('results-container');

            // 1. Validation des champs
            if (!token || !promptValue || !searchAreaBounds) {
                showError("Veuillez remplir le token, l'objet ciblé ET tracer une zone bleue sur la carte.");
                return;
            }

            // 2. Préparation de l'UI
            setLoadingState(true, btn, resultsDiv);
            aiLayers.clearLayers();

            try {
                // 3. Capture de la carte (Screenshot)
                const mapElement = document.getElementById('map');
                const canvas = await html2canvas(mapElement, { useCORS: true, allowTaint: false });
                const base64Image = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

                // 4. Appel à l'API Hugging Face (Modèle OwlViT)
                const response = await fetch("https://api-inference.huggingface.co/models/google/owlvit-base-patch32", {
                    method: "POST",
                    headers: { 
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        inputs: {
                            image: base64Image,
                            candidate_labels: [promptValue]
                        }
                    })
                });

                const aiResults = await response.json();

                // 5. Gestion des erreurs d'API (Token invalide, Cold Start...)
                if (!response.ok) {
                    if (aiResults.error && aiResults.error.toLowerCase().includes("loading")) {
                        throw new Error("L'IA est en cours de démarrage (Cold Start). Veuillez patienter 20 secondes et réessayer.");
                    }
                    throw new Error(aiResults.error || `Erreur serveur: ${response.status}`);
                }

                // 6. Traitement et Affichage des résultats
                processAiResults(aiResults, promptValue, resultsDiv);

            } catch (error) {
                console.error(error);
                showError(error.message);
            } finally {
                setLoadingState(false, btn, null);
            }
        });


        /**
         * FONCTIONS UTILITAIRES
         */
        
        function processAiResults(results, targetLabel, container) {
            let validCount = 0;
            container.innerHTML = ''; // Nettoyer les anciens résultats

            results.forEach(item => {
                // Filtrer par label et score de confiance (> 10%)
                if (item.label.toLowerCase() === targetLabel && item.score > 0.10) {
                    
                    // Conversion des Pixels (IA) vers GPS (Leaflet)
                    const topLeft = map.containerPointToLatLng([item.box.xmin, item.box.ymin]);
                    const bottomRight = map.containerPointToLatLng([item.box.xmax, item.box.ymax]);
                    const objectBounds = L.latLngBounds(topLeft, bottomRight);

                    // Vérifier si l'objet détecté est bien DANS le rectangle dessiné par l'utilisateur
                    if (searchAreaBounds.intersects(objectBounds)) {
                        validCount++;
                        const confidence = (item.score * 100).toFixed(1);
                        const center = objectBounds.getCenter();

                        // Dessiner le cadre sur la carte
                        const rect = L.rectangle(objectBounds, {
                            color: "#10b981", weight: 3, fillOpacity: 0.2
                        }).addTo(aiLayers);
                        rect.bindPopup(`<b>${item.label.toUpperCase()}</b><br>Score: ${confidence}%`);

                        // Ajouter la carte de résultat dans le panneau latéral
                        container.innerHTML += `
                            <div class="result-card">
                                <div class="result-card-header">
                                    <span class="result-label">${item.label}</span>
                                    <span class="result-score">${confidence}%</span>
                                </div>
                                <div class="result-coords">
                                    Lat: ${center.lat.toFixed(5)}<br>
                                    Lng: ${center.lng.toFixed(5)}
                                </div>
                            </div>
                        `;
                    }
                }
            });

            if (validCount === 0) {
                container.innerHTML = `<div class="alert alert-info">Aucun(e) <b>${targetLabel}</b> détecté(e) avec un score suffisant dans la zone ciblée.</div>`;
            }
        }

        function setLoadingState(isLoading, btn, container) {
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = '<div class="loader"></div> Analyse en cours...';
                if(container) container.innerHTML = '';
            } else {
                btn.disabled = false;
                btn.innerHTML = 'Lancer le scan satellite';
            }
        }

        function showError(message) {
            const container = document.getElementById('results-container');
            container.innerHTML = `<div class="alert alert-error"><b>Erreur :</b> ${message}</div>`;
        }
    </script>
</body>
</html>
